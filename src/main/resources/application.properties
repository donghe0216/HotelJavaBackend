spring.application.name=HotelBooking
server.port=9090

#MYSQL CONNECTION
spring.datasource.url=jdbc:mysql://localhost:3306/hotel
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# JWT (override in application-local.properties)
secreteJwtString=${JWT_SECRET:changeme-set-in-local-properties}

# Mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

#THE MAXIMUM SIGN OF IMAGE THAT CAN BE UPLOADED
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Actuator: health (CI readiness) + shutdown (JaCoCo flush in CI)
management.endpoints.web.exposure.include=health,shutdown
management.endpoint.health.show-details=never
management.endpoint.shutdown.enabled=true

# Image upload directory (override in application-local.properties)
app.image.upload-dir=${IMAGE_UPLOAD_DIR:./public/rooms/}

# Load local overrides if present
spring.config.import=optional:application-local.properties
