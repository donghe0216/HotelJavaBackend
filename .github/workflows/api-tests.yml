name: API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      # ── MySQL 8.0 ──────────────────────────────────────────────────
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hotel
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1b. Install CLI tools ──────────────────────────────────────
      #    ubuntu-latest ships with jq and mysql-client, but pin them
      #    explicitly so the workflow is self-documenting and survives
      #    runner image changes.
      - name: Install CLI tools
        run: sudo apt-get install -y --no-install-recommends jq mysql-client

      # ── 2. Java 21 + Maven cache ───────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build JAR (skip tests — server must start before tests) ─
      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress

      # ── 3b. Download JaCoCo agent ──────────────────────────────────
      #    Will be attached to the *backend* JVM so coverage data is for
      #    production code, not the test-runner process.
      - name: Download JaCoCo agent
        run: |
          mvn dependency:copy \
            -Dartifact=org.jacoco:org.jacoco.agent:0.8.12:jar:runtime \
            -DoutputDirectory=/tmp --no-transfer-progress
          mv /tmp/org.jacoco.agent-*-runtime.jar /tmp/jacoco-agent.jar

      # ── 4. Start backend with JaCoCo agent ────────────────────────
      #    Secrets are stored in GitHub Repo → Settings → Secrets and variables → Actions
      #    Required secrets: CI_JWT_SECRET, CI_STRIPE_SECRET_KEY
      - name: Start backend
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.CI_STRIPE_SECRET_KEY }}
        run: |
          mkdir -p /tmp/hotel-images
          java -javaagent:/tmp/jacoco-agent.jar=destfile=/tmp/jacoco.exec \
            -jar target/*.jar \
            --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/hotel \
            --spring.datasource.username=root \
            --spring.datasource.password=root \
            --secreteJwtString=${JWT_SECRET} \
            --stripe.api.secret.key=${STRIPE_SECRET_KEY} \
            --app.image.upload-dir=/tmp/hotel-images/ \
            --management.health.mail.enabled=false \
          > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          echo "Backend PID: $(cat /tmp/backend.pid)"

      # ── 5. Wait until backend is ready ────────────────────────────
      - name: Wait for backend
        run: |
          echo "Waiting for backend on port 9090..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — HTTP $STATUS, waiting 3s..."
            sleep 3
          done
          echo "Backend failed to start. Log:"
          cat /tmp/backend.log
          exit 1

      # ── 5b. Schema note ────────────────────────────────────────────
      #    Schema is created automatically by Hibernate on first startup.
      #    application.properties: spring.jpa.hibernate.ddl-auto=update
      #
      #    Trade-off: ddl-auto=update is convenient for dev/CI but is not
      #    safe for production (use Flyway/Liquibase for prod migrations).
      #    A Flyway migration is a recommended future improvement.

      # ── 6. Seed: register users via API + fix role via SQL ─────────
      - name: Seed users
        run: |
          # Register customer
          curl -s -X POST http://localhost:9090/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"firstName":"Customer","lastName":"User","email":"customer@hotel.com","password":"Customer1234!","phoneNumber":"09012345678"}' \
            | jq .

          # Register admin (initially CUSTOMER role)
          curl -s -X POST http://localhost:9090/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"firstName":"Admin","lastName":"User","email":"admin@hotel.com","password":"Admin1234!","phoneNumber":"09012345678"}' \
            | jq .

          # Promote admin via SQL
          mysql -h 127.0.0.1 -u root -proot hotel \
            -e "UPDATE users SET role='ADMIN' WHERE email='admin@hotel.com';"

          echo "Users seeded."

      # ── 7. Seed: insert a room directly via SQL ────────────────────
      - name: Seed room
        run: |
          mysql -h 127.0.0.1 -u root -proot hotel -e "
            INSERT INTO rooms (room_number, type, price_per_night, capacity, description, image_url)
            VALUES (101, 'DOUBLE', 150.00, 2, 'Standard double room for CI tests', '/images/placeholder.jpg');
          "
          # ConcurrentBookingTest now resolves room ID dynamically via API — no hardcoded ID=1
          mysql -h 127.0.0.1 -u root -proot hotel \
            -e "SELECT id, room_number, type FROM rooms;"

      # ── 8. Run API tests ───────────────────────────────────────────
      #    Excludes the "spring-context" tag to skip HotelBookingApplicationTests.
      #    That test starts a second Spring context which conflicts with the
      #    already-running backend on port 9090.
      #    The tag is declared on HotelBookingApplicationTests via @Tag("spring-context").
      - name: Run API tests
        run: |
          mvn test \
            --no-transfer-progress \
            -DexcludedGroups=spring-context

      # ── 9. Stop backend gracefully so JaCoCo flushes .exec to disk ──
      #    The JaCoCo agent only writes jacoco.exec when the JVM exits
      #    cleanly. Using Spring Boot's /actuator/shutdown (graceful) is
      #    more reliable than kill -9 which can truncate the file.
      - name: Stop backend (flush JaCoCo data)
        if: always()
        run: |
          curl -s -X POST http://localhost:9090/actuator/shutdown || true
          # Give the JVM up to 10s to write jacoco.exec then force-kill
          for i in $(seq 1 10); do
            kill -0 $(cat /tmp/backend.pid 2>/dev/null) 2>/dev/null || break
            sleep 1
          done
          kill $(cat /tmp/backend.pid 2>/dev/null) 2>/dev/null || true

      # ── 10. Generate JaCoCo report from backend coverage data ──────
      #    The agent wrote coverage to /tmp/jacoco.exec while tests ran.
      #    Now generate the HTML report using the backend's class files.
      - name: Generate JaCoCo coverage report
        if: always()
        run: |
          mvn jacoco:report \
            -Djacoco.dataFile=/tmp/jacoco.exec \
            --no-transfer-progress

      # ── 11. Generate Surefire HTML report ─────────────────────────
      #    Converts the XML test results into a browsable HTML report.
      - name: Generate Surefire HTML report
        if: always()
        run: mvn surefire-report:report-only --no-transfer-progress

      # ── 12. Upload Surefire + JaCoCo reports ──────────────────────
      - name: Upload Surefire XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-xml-report
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload Surefire HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-html-report
          path: target/site/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      # ── 10. Print backend log on failure ───────────────────────────
      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true
