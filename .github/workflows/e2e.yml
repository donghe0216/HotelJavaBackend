name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e:
    runs-on: ubuntu-latest

    # ── Centralised test config ─────────────────────────────────────
    #    Non-secret values reused across multiple steps.
    #    Real secrets (JWT, Stripe) live in GitHub Settings → Secrets.
    #    If you change seed credentials here, also update
    #    CUSTOMER / ADMIN constants in tests/auth/auth.setup.js.
    env:
      BACKEND_URL: http://localhost:9090
      DB_HOST: 127.0.0.1
      DB_PASSWORD: root
      SEED_CUSTOMER_EMAIL: customer@hotel.com
      SEED_CUSTOMER_PASSWORD: Customer1234!
      SEED_ADMIN_EMAIL: admin@hotel.com
      SEED_ADMIN_PASSWORD: Admin1234!

    services:
      # ── MySQL 8.0 ──────────────────────────────────────────────────
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hotel
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # ── MailHog (fake SMTP) ────────────────────────────────────────
      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025

    steps:
      # ── 1. Checkout frontend ───────────────────────────────────────
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      # ── 2. Checkout backend ────────────────────────────────────────
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HotelBookingBackend
          path: backend

      # ── 3. Set up Java 21 ──────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 4. Set up Node.js 20 ──────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── 5. Install frontend dependencies ──────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── 6. Build backend JAR ───────────────────────────────────────
      - name: Build backend JAR
        working-directory: backend
        run: mvn package -DskipTests --no-transfer-progress

      # ── 6b. Install CLI tools ──────────────────────────────────────
      #    ubuntu-latest ships with jq and mysql-client, but pin them
      #    explicitly so the workflow is self-documenting and survives
      #    runner image changes.
      - name: Install CLI tools
        run: sudo apt-get install -y --no-install-recommends jq mysql-client

      # ── 7. Start backend ───────────────────────────────────────────
      #    Required secrets: CI_JWT_SECRET, CI_STRIPE_SECRET_KEY
      #    Add via: GitHub repo → Settings → Secrets and variables → Actions
      - name: Start backend
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.CI_STRIPE_SECRET_KEY }}
        run: |
          mkdir -p /tmp/hotel-images
          java -jar target/*.jar \
            --spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/hotel \
            --spring.datasource.username=root \
            --spring.datasource.password=${DB_PASSWORD} \
            --secreteJwtString=${JWT_SECRET} \
            --spring.mail.host=localhost \
            --spring.mail.port=1025 \
            --spring.mail.username="" \
            --spring.mail.password="" \
            --stripe.api.secret.key=${STRIPE_SECRET_KEY} \
            --app.image.upload-dir=/tmp/hotel-images/ \
            --management.health.mail.enabled=false \
          > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      # ── 8. Wait for backend ────────────────────────────────────────
      #    Polls /actuator/health (Spring Boot standard readiness endpoint).
      #    Reports the actual HTTP status on each failed attempt for faster
      #    diagnosis — e.g. 000 = connection refused, 503 = DB not ready yet.
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${BACKEND_URL}/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — HTTP $STATUS, waiting 3s..."
            sleep 3
          done
          echo "Backend failed to start. Log:"; cat /tmp/backend.log; exit 1

      # ── 8b. Schema note ────────────────────────────────────────────
      #    Schema is created automatically by Hibernate on first startup.
      #    application.properties: spring.jpa.hibernate.ddl-auto=update
      #    (Flyway migration is a recommended future improvement for prod)

      # ── 9. Seed users ──────────────────────────────────────────────
      #    Uses env vars defined at job level — single source of truth.
      #    Checks HTTP status; exits non-zero if registration fails.
      #    Verifies rows via SQL after seeding.
      - name: Seed users
        run: |
          register() {
            local LABEL=$1 BODY=$2
            HTTP=$(curl -s -o /tmp/reg_${LABEL}.json -w "%{http_code}" \
              -X POST ${BACKEND_URL}/api/auth/register \
              -H "Content-Type: application/json" \
              -d "$BODY")
            jq . /tmp/reg_${LABEL}.json
            [ "$HTTP" = "200" ] || { echo "${LABEL} registration failed (HTTP $HTTP)"; exit 1; }
          }

          register customer \
            "{\"firstName\":\"Customer\",\"lastName\":\"User\",\"email\":\"${SEED_CUSTOMER_EMAIL}\",\"password\":\"${SEED_CUSTOMER_PASSWORD}\",\"phoneNumber\":\"09012345678\"}"

          register admin \
            "{\"firstName\":\"Admin\",\"lastName\":\"User\",\"email\":\"${SEED_ADMIN_EMAIL}\",\"password\":\"${SEED_ADMIN_PASSWORD}\",\"phoneNumber\":\"09012345678\"}"

          mysql -h ${DB_HOST} -u root -p${DB_PASSWORD} hotel \
            -e "UPDATE users SET role='ADMIN' WHERE email='${SEED_ADMIN_EMAIL}';"

          # Verify seed data is actually in DB
          C=$(mysql -h ${DB_HOST} -u root -p${DB_PASSWORD} hotel -sNe \
            "SELECT COUNT(*) FROM users WHERE email='${SEED_CUSTOMER_EMAIL}';")
          A=$(mysql -h ${DB_HOST} -u root -p${DB_PASSWORD} hotel -sNe \
            "SELECT COUNT(*) FROM users WHERE email='${SEED_ADMIN_EMAIL}' AND role='ADMIN';")
          echo "Seed verify — customer: ${C}, admin: ${A}"
          [ "$C" = "1" ] && [ "$A" = "1" ] || { echo "Seed verification failed"; exit 1; }

      # ── 10. Seed room ──────────────────────────────────────────────
      #    room_number=101 is arbitrary; E2E tests resolve the actual room
      #    ID dynamically via GET /rooms/all (no hardcoded ID dependency).
      #    INSERT IGNORE is idempotent — safe if the step is re-run.
      - name: Seed room
        run: |
          mysql -h ${DB_HOST} -u root -p${DB_PASSWORD} hotel -e "
            INSERT IGNORE INTO rooms (room_number, type, price_per_night, capacity, description, image_url)
            VALUES (101, 'DOUBLE', 150.00, 2, 'CI seed room', '/images/placeholder.jpg');
          "
          ROOM_COUNT=$(mysql -h ${DB_HOST} -u root -p${DB_PASSWORD} hotel -sNe \
            "SELECT COUNT(*) FROM rooms;")
          echo "Rooms in DB: ${ROOM_COUNT}"
          [ "$ROOM_COUNT" -ge "1" ] || { echo "Room seed failed"; exit 1; }

      # ── 11. Install Playwright browsers ───────────────────────────
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # ── 12. Run Playwright tests ───────────────────────────────────
      #    Frontend startup is handled by playwright.config.js webServer:
      #      CI    → npm run build && npx serve -s build -l 3000
      #              Tests the actual production bundle (minified, tree-shaken).
      #              Also validates that the build itself doesn't error.
      #      Local → npm start (CRA dev server, fast iteration with HMR)
      #    Playwright polls http://localhost:3000 until ready (timeout: 120s),
      #    then kills the process automatically when all tests finish.
      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: true
        run: npx playwright test

      # ── 13. Upload Playwright HTML report ─────────────────────────
      #    Contains test results summary, pass/fail status per test.
      #    Always uploaded so you can review even on success.
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      # ── 14. Upload test-results (traces, screenshots, videos) ──────
      #    playwright.config.js: screenshot=only-on-failure,
      #                          trace=on-first-retry, video=on-first-retry
      #    Only uploaded on failure to save storage.
      #    To open a trace locally: npx playwright show-trace trace.zip
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7

      # ── 15. Print backend log on failure ──────────────────────────
      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true
